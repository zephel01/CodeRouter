# ============================================================
# CodeRouter providers.yaml — sample
#
# Default behavior:
#   - allow_paid: false  (paid providers are skipped unless ALLOW_PAID=true)
#   - default_profile: 'default'
#
# To use:
#   1. cp examples/providers.yaml ~/.coderouter/providers.yaml
#   2. Edit base_url / model to match your local stack
#   3. cp examples/.env.example .env  and fill in OPENROUTER_API_KEY if you want fallback
#   4. coderouter serve
#
# Profiles provided (see the `profiles:` section at the bottom):
#   - default             generic chain, 7b local → 2 free clouds → (paid if allowed)
#   - claude-code         tuned for Claude Code (see README "Use it with Claude Code")
#                         — 7b first for latency, 14b as quality fallback, 14b has
#                           timeout_s=300 because Claude Code sends 15-20K-token
#                           system prompts every turn that take ~100s to prefill.
#                           Then 2 free OpenRouter models (qwen3-coder / gpt-oss-120b,
#                           different vendors for rate-limit diversity) as cloud
#                           escape hatches, Claude as paid last resort.
#   - claude-code-direct  same as claude-code but the paid last resort is
#                         `anthropic-direct` (kind: anthropic) instead of
#                         `openrouter-claude` (kind: openai_compat). Use this when:
#                           (a) you want cache_control / thinking blocks to survive
#                               the hop (they're lost through openai_compat's
#                               OpenAI-shape round-trip), AND
#                           (b) your client reaches CodeRouter via the Anthropic
#                               ingress (`ANTHROPIC_BASE_URL=http://localhost:8088`).
#                         If (a) is needed but your client uses `/v1/chat/completions`,
#                         basic chat / tools / vision still work in v0.4-A (adapter
#                         internally reverse-translates ChatRequest→AnthropicRequest),
#                         but cache_control / thinking require the Anthropic ingress.
#   - coding              alias of default, kept for backward compat
#   - free-only           skips paid tier entirely
#
# Free-tier notes (2026-04):
#   OpenRouter free models are rate-limited to ~20 req/min and ~200 req/day
#   per model per account. Listing TWO free providers in each profile gives
#   you one escape hatch when one of them returns 429. Prefer picking from
#   DIFFERENT vendor families (e.g. qwen + openai/gpt-oss) since per-account
#   quotas can be shared across same-vendor SKUs.
#   Current roster verified against https://openrouter.ai/api/v1/models on
#   2026-04-20:
#     - qwen/qwen3-coder:free       (262K ctx, tools, agentic coding spec.) ✓
#     - openai/gpt-oss-120b:free    (131K ctx, tools, 117B MoE/5.1B active) ✓
#   deepseek/deepseek-r1:free was removed from the free roster at some point
#   in 2026 Q1 — don't re-introduce it without confirming it's back.
# ============================================================

allow_paid: false
# v1.7-B: デフォルトを `multi` に。マルチモーダル対応 (vision-capable
# モデルを fallback に持つ) かつ general purpose にも使える chain なので、
# 用途未指定時の "迷ったらこれ" として最も無難。
# 用途別に明示するなら `coderouter serve --mode coding|general|reasoning`、
# または `coderouter serve --mode default` (これも multi の alias) で。
default_profile: multi
display_timezone: Asia/Tokyo

# v1.7-B: 用途別 mode_aliases — 起動時 / リクエスト header で短い名前で
# プロファイルを選べます。`coderouter serve --mode coding` または
# クライアント側で `X-CodeRouter-Mode: coding` を投げると、
# 内部的に「coding」プロファイルにルーティングされます。
mode_aliases:
  default: multi    # 「default」と書いたら multi を引く (旧 default profile からの移行用)
  fast: general     # 短い応答が欲しいとき
  vision: multi     # 画像入力をしたいとき
  think: reasoning  # 長文推論したいとき
  cheap: general    # 一番安く済ませたいとき

# v1.5-E: timezone used to render timestamps in the dashboard header /
# "Recent Events" list and in `coderouter stats` output. Must be an IANA
# zone name (e.g. "Asia/Tokyo", "America/New_York", "Europe/London").
# Unset → UTC. The underlying /metrics.json snapshot always carries UTC
# ISO timestamps; conversion is display-only, so switching this value
# does NOT re-write historical events in the ring.
# display_timezone: Asia/Tokyo

providers:
  # ------------------------------------------------------------
  # Tier 1: local (free, top priority)
  # ------------------------------------------------------------

  # llama.cpp --api-server — fastest if you have a GGUF loaded
  - name: local-llamacpp
    kind: openai_compat
    base_url: http://localhost:8080/v1
    model: qwen2.5-coder
    paid: false
    timeout_s: 60
    capabilities:
      chat: true
      streaming: true
      tools: false              # toggle true once your local model is reliable

  # Ollama — convenient for trying multiple models
  # Small & fast (1-2s/turn on M-series for non-Claude-Code traffic,
  # but tool selection is weak — not recommended as Claude Code's primary).
  - name: ollama-qwen-coder-1_5b
    kind: openai_compat
    base_url: http://localhost:11434/v1
    model: qwen2.5-coder:1.5b
    paid: false
    timeout_s: 60
    capabilities:
      chat: true
      streaming: true
      tools: false              # 1.5b is below the reliable tool-calling threshold

  # Balanced default for interactive coding. This is the sweet spot for
  # Claude Code: tool selection mostly works, prompt eval ~30s on M-series.
  - name: ollama-qwen-coder-7b
    kind: openai_compat
    base_url: http://localhost:11434/v1
    model: qwen2.5-coder:7b
    paid: false
    timeout_s: 120
    # v1.0-A: Qwen2.5-Coder intermittently emits <think>...</think> in the
    # content channel under Claude Code's tool-heavy prompting. Strip at the
    # adapter boundary so the UI never renders it. `strip_stop_markers` is
    # not needed here (Qwen2.5 uses <|im_end|> but Ollama's chat template
    # terminates cleanly on it). Run `coderouter doctor --check-model
    # ollama-qwen-coder-7b` to verify the probe agrees.
    output_filters: [strip_thinking]
    capabilities:
      chat: true
      streaming: true
      tools: true

  # Highest-quality local option. Timeout bumped to 300s because Claude Code's
  # system prompt (15-20K tokens) takes ~100s to prefill on 14b even on M3 Max.
  # Use as a quality fallback when 7b misfires, not as the primary — first-byte
  # latency is felt by the user.
  - name: ollama-qwen-coder-14b
    kind: openai_compat
    base_url: http://localhost:11434/v1
    model: qwen2.5-coder:14b
    paid: false
    timeout_s: 300
    # v1.0-A: same reasoning as the 7b entry — Qwen2.5-Coder family leaks
    # <think> blocks occasionally. Scrubbing is cheap (single regex-free pass
    # over the stream) so enable it unconditionally on this SKU.
    output_filters: [strip_thinking]
    capabilities:
      chat: true
      streaming: true
      tools: true

  # ------------------------------------------------------------
  # HF-on-Ollama reference stanza (v0.7-C)
  #
  # Ollama 0.3.13+ can run any HF-hosted GGUF directly via
  # `ollama run hf.co/<user>/<repo>:<quant>`. This block is a template
  # with the 5 knobs that matter most when using HF distilled / fine-tuned
  # variants through CodeRouter. Each is mapped to the corresponding Ollama
  # beginner silent-fail symptom in the README Troubleshooting section; run
  # `coderouter doctor --check-model ollama-hf-example` after editing to
  # verify declarations match observed behavior.
  #
  # The block is commented out by default — uncomment and adjust when you
  # actually pull an HF GGUF. Typical candidates:
  #   hf.co/unsloth/Qwen2.5-Coder-7B-Instruct-GGUF:Q4_K_M   (coding, tools-capable)
  #   hf.co/bartowski/Qwen3-8B-GGUF:Q5_K_M                  (Qwen3 distill, <think>-leaky)
  #   hf.co/unsloth/DeepSeek-R1-Distill-Qwen-7B-GGUF:Q4_K_M (reasoning distill, tools-weak)
  #
  # Reminder: the HF `:<quant>` suffix is REQUIRED. Omitting it yields
  # `404 model not found` from Ollama (v0.7-B doctor's auth+basic-chat probe
  # surfaces this as UNSUPPORTED with an `ollama pull` hint).
  # ------------------------------------------------------------

  # - name: ollama-hf-example
  #   kind: openai_compat
  #   base_url: http://localhost:11434/v1
  #   # Replace with the `ollama list` entry verbatim, `:<quant>` suffix included.
  #   model: hf.co/unsloth/Qwen2.5-Coder-7B-Instruct-GGUF:Q4_K_M
  #   paid: false
  #   # Prefill of Claude Code's 15-20K-token system prompt dominates latency on
  #   # any 7B+ model; budget generously. Symptom 1 is not a timeout failure
  #   # per se — it's Ollama silently truncating the prompt to num_ctx below.
  #   timeout_s: 300
  #   extra_body:
  #     options:
  #       # Symptom 1: Ollama default `num_ctx` is 2048. Claude Code's system
  #       # prompt alone is 15-20K tokens, so prompts get truncated from the
  #       # FRONT (where the tool definitions live) and the model silently
  #       # forgets it has tools. Bump to 32K for Claude Code workloads;
  #       # lower (8K) is fine for plain chat traffic.
  #       num_ctx: 32768
  #   # Symptom 3 (primary): Qwen3 distills (and some R1 distills) inline
  #   # <think>...</think> in the content channel instead of using a thinking
  #   # block. Two independent remediations, pick either (or both):
  #   #
  #   #   (a) Source-side opt-out — append Qwen3's native `/no_think` directive
  #   #       to the system prompt. Cheapest when it works, but some distills
  #   #       ignore the directive.
  #   # append_system_prompt: "/no_think"
  #   #
  #   #   (b) Output-side scrub (v1.0-A) — strip at the adapter boundary
  #   #       regardless of what the model emits. Works on every model, at the
  #   #       cost of a single pass over the stream. Prefer this if you also
  #   #       see <|turn|> / <|end|> leakage — add `strip_stop_markers` too.
  #   output_filters: [strip_thinking]
  #   capabilities:
  #     chat: true
  #     streaming: true
  #     # Symptom 2: small quantized distills often ignore the `tools` parameter
  #     # or emit malformed JSON. Start with `false` (CodeRouter falls back to
  #     # plain chat completions), then flip to `true` if `coderouter doctor`
  #     # reports the tool_calls probe as OK. Setting `true` when the model
  #     # can't actually call tools causes Claude Code to hang waiting for a
  #     # tool_use block that never arrives.
  #     tools: false

  # ------------------------------------------------------------
  # Tier 2: free cloud (escape hatch)
  #
  # OpenRouter free-tier rate limits (as of 2026-04):
  #   ~20 req/min, ~200 req/day per model, per account.
  # Listing multiple free providers lets the chain fall through when one
  # model hits the daily cap — keep both entries enabled if you use Claude
  # Code heavily.
  # ------------------------------------------------------------

  # Primary free choice. Qwen3-Coder 480B MoE (35B active) — optimized for
  # agentic coding with tool use, 262K context. Can emit tool calls inside
  # <tool_call>{...}</tool_call> text wrappers; v0.3-A tool-call repair
  # extracts the JSON body and lifts it back to a proper tool_use block.
  - name: openrouter-free
    kind: openai_compat
    base_url: https://openrouter.ai/api/v1
    model: qwen/qwen3-coder:free
    api_key_env: OPENROUTER_API_KEY
    paid: false                # OpenRouter free tier — no charge
    timeout_s: 60
    capabilities:
      chat: true
      streaming: true
      tools: true

  # Rate-limit escape hatch for when openrouter-free returns 429. Chosen for
  # vendor diversity (different account / quota pool from Qwen) so that a
  # Qwen-side 429 doesn't also hit this entry. gpt-oss-120b is OpenAI's
  # open-weight 117B MoE (5.1B active), 131K context, built for agentic /
  # production use with native tool calling.
  #
  # Note (2026-04): Previously this slot was `deepseek/deepseek-r1:free`, but
  # that SKU was removed from OpenRouter's free roster. gpt-oss replaces it.
  - name: openrouter-gpt-oss-free
    kind: openai_compat
    base_url: https://openrouter.ai/api/v1
    model: openai/gpt-oss-120b:free
    api_key_env: OPENROUTER_API_KEY
    paid: false
    timeout_s: 60
    capabilities:
      chat: true
      streaming: true
      tools: true

  # ------------------------------------------------------------
  # Tier 3: paid cloud (last resort, blocked unless ALLOW_PAID=true)
  # ------------------------------------------------------------

  # Claude via OpenRouter. OpenRouter typically maintains slug aliases that
  # point to the current-stable Anthropic model, so `claude-sonnet-4` will
  # often redirect to the latest minor version. Pin to a specific slug
  # (e.g. `anthropic/claude-sonnet-4.6`) if you want reproducibility.
  - name: openrouter-claude
    kind: openai_compat
    base_url: https://openrouter.ai/api/v1
    model: anthropic/claude-sonnet-4
    api_key_env: OPENROUTER_API_KEY
    paid: true
    timeout_s: 60
    capabilities:
      chat: true
      streaming: true
      tools: true

  # Claude direct via Anthropic's native Messages API (v0.3.x-1).
  # Unlike the OpenRouter entry above, this uses `kind: anthropic` — the
  # router passes the request body straight through `/v1/messages` to
  # api.anthropic.com with no OpenAI-shape translation in between when
  # reached via the Anthropic ingress. This preserves native features
  # (cache_control, thinking blocks, structured tool_use SSE events)
  # that would otherwise be lossy through the ChatRequest round-trip.
  #
  # v0.4-A update: this provider is ALSO reachable from the OpenAI-shape
  # ingress (`/v1/chat/completions`). AnthropicAdapter internally runs
  # ChatRequest → AnthropicRequest → native call → ChatResponse, and the
  # streaming path produces proper OpenAI-shape StreamChunks. Anthropic-
  # only features (cache_control / thinking) still require the
  # `/v1/messages` ingress, but basic chat / tools / vision work from
  # either side.
  # Model: `claude-sonnet-4-6` — chosen because Claude Code sends
  # adaptive-thinking requests (`thinking.type: enabled` with dynamic
  # budget) for some side calls (topic naming / auto-compact summaries).
  # Older models like `claude-sonnet-4-5-20250929` 400 those with
  # `"adaptive thinking is not supported on this model"`. Verified real-
  # machine on 2026-04-20 against live Claude Code traffic — see
  # CHANGELOG [v0.4-D] for the full diagnostic chain.
  - name: anthropic-direct
    kind: anthropic
    base_url: https://api.anthropic.com
    model: claude-sonnet-4-6
    api_key_env: ANTHROPIC_API_KEY
    paid: true
    timeout_s: 60
    capabilities:
      chat: true
      streaming: true
      tools: true
      # v0.5-A capability gate. Setting `thinking: true` explicitly tells
      # the router this provider accepts Anthropic's `thinking: {type:
      # enabled, ...}` body field. When unset (like here), the router
      # falls back to a model-name heuristic — claude-sonnet-4-6 /
      # claude-opus-4-* / claude-haiku-4-* are auto-detected as capable.
      # Declaring it explicitly is only needed for forward-compat with
      # new Claude families before the heuristic table is updated, e.g.:
      #   thinking: true
    # Optional: override the default anthropic-version header (2023-06-01)
    # extra_body:
    #   anthropic_version: "2023-06-01"

  # ============================================================
  # v1.7-B: 用途別プロファイル (multi / coding / general / reasoning)
  # 用のプロバイダ群。
  #
  # 設計思想 — Claude Code との挙動互換性を最優先に
  # ----------------------------------------------------
  # CodeRouter のメインユースケースは Claude Code の代替バックエンド。
  # Sonnet/Opus と「意味合い」が乖離した応答が返ると、ユーザーは
  # 「なんでだろ?」と混乱します。それを最小化するため、各プロファイル
  # 側で 3 つのレバーを併用しています:
  #
  #   1. Claude 風モデルを優先選定 (Qwen3-Coder family が agentic
  #      coding で Sonnet に最も近い、GLM が Opus 風 reasoning など)
  #   2. プロファイル単位の append_system_prompt で Claude 風応答を
  #      nudge (詳細は profiles: の各エントリ参照)
  #   3. output_filters で <think> タグなど surface 差をクリーンアップ
  #
  # 各プロバイダのコメントに「Claude 互換性スコア (★1-5)」を載せて
  # あります — 用途別プロファイルの fallback 順序を決める根拠です。
  # ============================================================

  # ------------------------------------------------------------
  # ローカル — Qwen3-Coder family (coding 主軸、Claude Sonnet 互換 ★★★★★)
  #
  # Qwen3-Coder は Alibaba が agentic coding 専用設計で学習した coder
  # series。Claude Sonnet の tool-call 行動に最も近いとコミュニティで
  # 評価されており (note 記事: r/LocalLLaMA 2026-04 Megathread 等)、
  # Claude Code 用途では最良のローカル代替。30B-A3B は MoE で
  # active 約 3B、RTX 4090 / M-series 24GB+ で実用速度。
  #
  # Ollama tag が 2026-04 時点で利用可能か確認した上で active 化して
  # ください。未公開なら下の HF-on-Ollama 経路 (commented stanza) で
  # GGUF を直接ロードできます。
  # ------------------------------------------------------------

  # Qwen3-Coder 30B-A3B (MoE) — coding profile の最有力ローカル候補。
  # 24GB+ VRAM 推奨、Q4_K_M なら 18GB 程度。
  - name: ollama-qwen3-coder-30b
    kind: openai_compat
    base_url: http://localhost:11434/v1
    model: qwen3-coder:30b-a3b
    paid: false
    # Qwen3 は thinking track を強く使うため、prompt eval は短めだが
    # output が冗長になりがち。240s で大半の Claude Code ターンをカバー。
    timeout_s: 240
    # Qwen 系列共通: <think> リークと stop marker を念のため除去。
    output_filters: [strip_thinking, strip_stop_markers]
    capabilities:
      chat: true
      streaming: true
      tools: true

  # ------------------------------------------------------------
  # ローカル — Qwen3.6 family (coding / general 用、Claude Sonnet 互換 ★★★★★)
  #
  # 2026-04 リリースの Qwen3.6 シリーズ。Ollama 公式 tag (qwen3.6:27b /
  # qwen3.6:35b) が並んでおり、全 variant が vision+tools+thinking 対応、
  # context は 256K。note 記事 (r/LocalLLaMA 2026-04 Megathread) では
  # 35B-A3B が「Claude Code 代替として最高」「local champ」と評価。
  #
  # ollama.com/library/qwen3.6 で公式 tag 確認:
  #   qwen3.6:27b   17GB / 256K / vision+tools+thinking
  #   qwen3.6:35b   24GB / 256K / vision+tools+thinking (= :latest, "35b a3b")
  #   qwen3.6:27b-coding-mxfp8  31GB (MLX, Apple silicon, Text only)
  #   qwen3.6:35b-a3b-coding-mxfp8  38GB (MLX, Apple silicon)
  #   ...他 MLX coding variant 多数 (Apple silicon 用)
  # ------------------------------------------------------------

  # Qwen3.6 35B-A3B — note 記事の "local champ"。MoE で active 約 3B、
  # M3 Ultra / RTX 4090 24GB+ で快適。Claude Sonnet 互換性が最も高い。
  - name: ollama-qwen3-6-35b
    kind: openai_compat
    base_url: http://localhost:11434/v1
    model: qwen3.6:35b
    paid: false
    # 256K context + thinking で長文出力もあり得るので余裕を持たせる
    timeout_s: 240
    output_filters: [strip_thinking, strip_stop_markers]
    capabilities:
      chat: true
      streaming: true
      vision: true
      tools: true

  # Qwen3.6 27B — 35B が動かない 16-20GB GPU 向け fallback。
  - name: ollama-qwen3-6-27b
    kind: openai_compat
    base_url: http://localhost:11434/v1
    model: qwen3.6:27b
    paid: false
    timeout_s: 180
    output_filters: [strip_thinking, strip_stop_markers]
    capabilities:
      chat: true
      streaming: true
      vision: true
      tools: true

  # ------------------------------------------------------------
  # ローカル — Gemma 4 family (general / multi 用、Claude Haiku 互換 ★★★)
  #
  # 2026-04 リリースの Gemma 4 シリーズ。Ollama 公式 tag が出揃い、
  # 全 variant が vision+tools+thinking、E2B/E4B は audio もサポート。
  # note 記事では「日常・バランスの王者」「26B-A4B が神」と評価。
  #
  # ollama.com/library/gemma4 で公式 tag 確認:
  #   gemma4:e2b    7.2GB / 128K / vision+tools+thinking+audio (Effective 2B)
  #   gemma4:e4b    9.6GB / 128K / vision+tools+thinking+audio (= :latest)
  #   gemma4:26b   18GB  / 256K / vision+tools+thinking (MoE 25.2B/3.8B-active)
  #   gemma4:31b   20GB  / 256K / vision+tools+thinking (Dense 30.7B)
  #
  # 推奨デフォルト:
  #   軽量機 / laptop      → gemma4:e4b
  #   16-20GB VRAM の GPU  → gemma4:26b   ← note 記事推奨の "26B-A4B"
  #   24GB+ VRAM           → gemma4:31b
  # ------------------------------------------------------------

  # Gemma 4 26B-A4B — note 記事の "日常・バランスの王者"。
  # MoE 25.2B total / 3.8B active、multi プロファイル primary 想定。
  - name: ollama-gemma4-26b
    kind: openai_compat
    base_url: http://localhost:11434/v1
    model: gemma4:26b
    paid: false
    timeout_s: 180
    capabilities:
      chat: true
      streaming: true
      vision: true
      tools: true

  # Gemma 4 E4B — laptop / iGPU 向け軽量 vision モデル。
  # general プロファイルの軽量 primary としても、multi の軽量 fallback
  # としても使える。応答が速く、Haiku 風のテンポ。
  - name: ollama-gemma4-e4b
    kind: openai_compat
    base_url: http://localhost:11434/v1
    model: gemma4:e4b
    paid: false
    timeout_s: 60
    capabilities:
      chat: true
      streaming: true
      vision: true
      tools: true

  # Gemma 4 31B (Dense) — 24GB+ VRAM の品質重視 fallback。
  # 26B (MoE) より一貫した出力だが速度は遅い。
  - name: ollama-gemma4-31b
    kind: openai_compat
    base_url: http://localhost:11434/v1
    model: gemma4:31b
    paid: false
    timeout_s: 240
    capabilities:
      chat: true
      streaming: true
      vision: true
      tools: true

  # ------------------------------------------------------------
  # 有料クラウド — Z.AI / GLM coding plan (Claude 互換 ★★★★)
  #
  # Z.AI (Zhipu AI) の GLM family は note 記事で「intent 理解が
  # Claude Opus 級」「agentic / coding で consumer hardware 最強」と
  # 評価。OpenAI-compat エンドポイントで提供されているため kind:
  # openai_compat でそのまま接続可能。
  #
  # 2 種類の base_url:
  #
  #   1. Coding Plan (subscription, 月額固定で prompt 量制限):
  #      https://api.z.ai/api/coding/paas/v4
  #      → Lite $18/月〜、Claude Code / Cursor / Cline 等の
  #        公式サポートツール経由が前提
  #
  #   2. General API (pay-as-you-go):
  #      https://api.z.ai/api/paas/v4
  #      → CodeRouter / 自作ツール経由でも制限なく使える
  #
  # 重要 — Coding Plan の "unauthorized tool" 警告:
  #   Z.AI Coding Plan は「公式サポートツールを通じた利用」を前提とし、
  #   未認可のサードパーティツール経由のアクセスは benefit が制限される
  #   可能性があると公式 docs に明記されています (docs.z.ai/devpack/overview)。
  #   CodeRouter は Anthropic API 互換 ingress を提供するため、Claude Code
  #   から見れば認可ツールに見えますが、Z.AI 側の検出ロジック次第で
  #   "router 経由" と判定されるリスクは残ります。
  #
  #   推奨運用:
  #     - Coding Plan 加入者で確実性を取りたい → Claude Code に Z.AI を
  #       直結 (CodeRouter を経由しない) または zai-paas (General API) を使う
  #     - General API (pay-as-you-go) は制限対象外なので CodeRouter 経由で
  #       問題なし。料金は使用量比例 ($X/1M tokens)
  #
  # モデル名の slug は **大文字必須** (Cursor 等のドキュメント明記)。
  #   GLM-5.1       — Opus 級フラッグシップ
  #   GLM-5         — GLM-5 系
  #   GLM-5-Turbo   — Opus 級、低 quota 消費
  #   GLM-4.7       — Sonnet/Opus 級、Coding Plan のデフォルト
  #   GLM-4.5-Air   — Haiku 級、軽量・高速応答
  # ------------------------------------------------------------

  # GLM Coding Plan 主力モデル (Sonnet 級、デフォルト)。
  # Coding Plan 加入者向け。注意点は上のセクションコメント参照。
  - name: zai-coding-glm-4-7
    kind: openai_compat
    base_url: https://api.z.ai/api/coding/paas/v4
    model: GLM-4.7
    api_key_env: Z_AI_API_KEY
    paid: true
    timeout_s: 60
    capabilities:
      chat: true
      streaming: true
      tools: true
      vision: true

  # GLM Coding Plan フラッグシップ (Opus 級)。peak/off-peak で quota が
  # 異なる (peak 3x, off-peak 2x 消費) ので reasoning profile 専用想定。
  - name: zai-coding-glm-5-1
    kind: openai_compat
    base_url: https://api.z.ai/api/coding/paas/v4
    model: GLM-5.1
    api_key_env: Z_AI_API_KEY
    paid: true
    # GLM-5.1 + reasoning は応答が長くなりがち
    timeout_s: 180
    capabilities:
      chat: true
      streaming: true
      tools: true
      vision: true

  # GLM Coding Plan 軽量モデル (Haiku 級)。
  # general プロファイルの paid fallback として有効。
  - name: zai-coding-glm-4-5-air
    kind: openai_compat
    base_url: https://api.z.ai/api/coding/paas/v4
    model: GLM-4.5-Air
    api_key_env: Z_AI_API_KEY
    paid: true
    timeout_s: 60
    capabilities:
      chat: true
      streaming: true
      tools: true
      vision: true

  # General API 経由の GLM-4.7 (pay-as-you-go、Coding Plan の "unauthorized
  # tool" 制限対象外)。CodeRouter 経由で安心して使いたい場合はこちら。
  # コメントアウト状態で配置 — Coding Plan 加入者は zai-coding-* を
  # 優先して使う想定なので、必要になったら下のコメントを外す。
  # - name: zai-paas-glm-4-7
  #   kind: openai_compat
  #   base_url: https://api.z.ai/api/paas/v4
  #   model: GLM-4.7
  #   api_key_env: Z_AI_API_KEY
  #   paid: true
  #   timeout_s: 60
  #   capabilities:
  #     chat: true
  #     streaming: true
  #     tools: true
  #     vision: true

  # ------------------------------------------------------------
  # 無料クラウド — Gemini Flash (multi / general、Claude Haiku 互換 ★★★)
  #
  # OpenRouter 経由の Gemini 2.5 Flash 無料枠 (2026-04 時点)。
  # 1M context、vision 対応、応答が速い。free 階層 のレート制限は
  # ~20 req/min / ~200 req/day。multi プロファイルの cloud fallback として
  # local Gemma 3 の次に置く。
  #
  # 公式 slug が gemini-2.5 系から異動する可能性があるので、404 が
  # 出たら https://openrouter.ai/api/v1/models で最新 slug を確認の上
  # 上書き。
  # ------------------------------------------------------------

  - name: openrouter-gemini-flash-free
    kind: openai_compat
    base_url: https://openrouter.ai/api/v1
    model: google/gemini-2.5-flash:free
    api_key_env: OPENROUTER_API_KEY
    paid: false
    timeout_s: 60
    capabilities:
      chat: true
      streaming: true
      vision: true
      tools: true

  # ------------------------------------------------------------
  # 有料クラウド — Claude Haiku / Opus (general / reasoning 終端)
  #
  # Sonnet (anthropic-direct above) の弟妹モデル。
  # - Haiku 4-5: general 用の最速・最安 paid。Sonnet の 1/5 程度のコスト。
  # - Opus 4-1: reasoning の終端。thinking 有効時の長文推論で別格。
  #
  # ALLOW_PAID=true のときのみ chain に乗ります。
  # ------------------------------------------------------------

  - name: anthropic-haiku-direct
    kind: anthropic
    base_url: https://api.anthropic.com
    model: claude-haiku-4-5
    api_key_env: ANTHROPIC_API_KEY
    paid: true
    timeout_s: 60
    capabilities:
      chat: true
      streaming: true
      tools: true
      vision: true
      # claude-haiku-4-* は thinking 対応 (capability registry が
      # bundled YAML で先回り宣言済み、v0.5-A)

  - name: anthropic-opus-direct
    kind: anthropic
    base_url: https://api.anthropic.com
    model: claude-opus-4-1
    api_key_env: ANTHROPIC_API_KEY
    paid: true
    # Opus + thinking は応答が長くなりがち。Claude Code の auto-compact
    # 経路に飲み込まれないよう余裕を持たせる。
    timeout_s: 180
    capabilities:
      chat: true
      streaming: true
      tools: true
      vision: true
      # claude-opus-4-* は thinking 対応 (registry 先回り済み)

  # ============================================================
  # HF-on-Ollama 経路: Ollama 公式 tag が無い trending モデル
  # ============================================================
  #
  # 2026-04 時点で Ollama 公式 registry に未登録、または安定 tag が
  # 提供されていない人気モデル群。Ollama 0.3.13+ は HuggingFace 上の
  # GGUF を `ollama run hf.co/<user>/<repo>:<quant>` で直接実行できます。
  #
  # 登録手順 (詳細は docs/hf-ollama-models.md 参照):
  #
  #   1. ターゲット GGUF を ollama に download
  #      ollama pull hf.co/unsloth/Qwen3-Coder-30B-A3B-GGUF:Q4_K_M
  #
  #   2. (任意) ローカル alias を作る
  #      ollama cp hf.co/unsloth/Qwen3-Coder-30B-A3B-GGUF:Q4_K_M qwen3-coder:30b
  #
  #   3. 該当 stanza のコメントを外して有効化、`model:` フィールドを
  #      上記 (1) または (2) の名前に揃える。
  #
  #   4. `coderouter doctor --check-model <name>` で疎通 + capability 確認。
  #      不一致が出たら `coderouter doctor --check-model <name> --apply`
  #      で patch 自動反映 (v1.7-B #3)。
  #
  # 注: HF GGUF は同じモデル名で複数の量子化が並びます (Q4_K_M / Q5_K_M /
  # Q6_K_M / Q8_0 等)。Q4_K_M がサイズと品質のバランス最良 — 24GB VRAM で
  # 30B-A3B が動く。Q5/Q6 はメモリに余裕があれば品質向上。

  # --- Qwen3-Coder 480B-A35B (HF) — coding の最強ローカル候補 ---
  # MoE で active 35B、Q4_K_M で約 240GB。Mac M3 Ultra 192GB unified +
  # 一部 swap、または NVIDIA H100 x2 級のハードウェアが必要。
  # 動かせる環境では Sonnet 級の coding 体験。
  # - name: ollama-qwen3-coder-480b-hf
  #   kind: openai_compat
  #   base_url: http://localhost:11434/v1
  #   model: hf.co/unsloth/Qwen3-Coder-480B-A35B-Instruct-GGUF:Q4_K_M
  #   paid: false
  #   timeout_s: 300
  #   output_filters: [strip_thinking, strip_stop_markers]
  #   capabilities:
  #     chat: true
  #     streaming: true
  #     tools: true

  # 注: Gemma 4 / GLM-4.5-Air は 2026-04 時点で:
  # - Gemma 4: Ollama 公式 tag (gemma4:e4b/26b/31b) で利用可能 — 上の
  #   ollama-gemma4-* stanza を参照
  # - GLM-4.5-Air: Z.AI の cloud API 経由 (zai-coding-glm-4-5-air) で
  #   利用可能 — または HF GGUF (unsloth/bartowski) 経由でローカルにも
  #   展開可能。下の commented stanza を参照
  #
  # 以下は HF GGUF をローカルに展開したい場合の reference stanza:

  # --- GLM-4.5-Air (HF GGUF) — ローカルで動かしたい場合 ---
  # Z.AI cloud (zai-coding-glm-4-5-air) を使えば登録不要。ローカルで
  # 動かす場合のみコメントを外してください。
  # - name: ollama-glm-4-5-air-hf
  #   kind: openai_compat
  #   base_url: http://localhost:11434/v1
  #   model: hf.co/unsloth/GLM-4.5-Air-GGUF:Q4_K_M
  #   paid: false
  #   timeout_s: 240
  #   # GLM 系も <think> を出すので scrub 推奨
  #   output_filters: [strip_thinking]
  #   capabilities:
  #     chat: true
  #     streaming: true
  #     tools: true

  # --- Qwen3.x Opus 蒸留モデル (HF) — reasoning の有力候補 ---
  # Opus 風の応答スタイルを Qwen3 base に蒸留したコミュニティ fine-tune。
  # 配布元・正式名は HF で「qwen3 opus distill」「claude-distill qwen3」
  # で検索。下記モデル名はプレースホルダ — 実在の repo に置き換えて
  # ください。
  # - name: ollama-qwen3-opus-distill-hf
  #   kind: openai_compat
  #   base_url: http://localhost:11434/v1
  #   # 実在の HF repo に書き換えてください (例:
  #   # hf.co/<user>/qwen3-opus-distill-30b-GGUF:Q4_K_M )。
  #   model: hf.co/REPLACE_ME/Qwen3-Opus-Distill-30B-GGUF:Q4_K_M
  #   paid: false
  #   timeout_s: 240
  #   output_filters: [strip_thinking, strip_stop_markers]
  #   capabilities:
  #     chat: true
  #     streaming: true
  #     tools: true

  # ------------------------------------------------------------
  # v1.0 real-machine verify providers (v1.0-verify)
  #
  # Paired Ollama stanzas used by `scripts/verify_v1_0.sh` to prove the
  # three v1.0 sub-release gates (A output_filters / B num_ctx probe /
  # C streaming probe) all behave end-to-end against a live local Ollama.
  #
  # `verify-ollama-bare`: worst-case setup — no output_filters, and
  #   extra_body.options declared at deliberately pathological values
  #   (num_ctx = 2048, num_predict = 16). Forces <think> leakage through
  #   and guarantees the num_ctx / streaming probes both trip
  #   NEEDS_TUNING regardless of what the local Ollama build's actual
  #   defaults happen to be (some forks and newer builds raise num_ctx
  #   well above 2048 and num_predict high enough that a "count to 30"
  #   prompt finishes normally). num_predict = 16 is low enough that the
  #   streaming probe's "Count from 1 to 30" prompt is cut off after
  #   ~8 numbers (≈16 chars, well below the 40-char threshold for
  #   NEEDS_TUNING) — and also low enough that the num_ctx probe's
  #   canary-echo response cannot accidentally contain the canary token.
  #   Used as the "symptom-present" side of the verify.
  #
  # `verify-ollama-tuned`: healthy counterpart — output_filters enabled,
  #   both num_ctx and num_predict declared. Used as the "symptom-absent"
  #   side; the doctor probes should flip to OK here.
  #
  # Prerequisite: `ollama pull qwen2.5-coder:7b` on localhost, Ollama
  # service running on :11434. The verify script fails fast if either
  # is missing.
  # ------------------------------------------------------------

  - name: verify-ollama-bare
    kind: openai_compat
    base_url: http://localhost:11434/v1
    model: qwen2.5-coder:7b
    paid: false
    timeout_s: 120
    # Deliberately NO output_filters here — v1.0-A scenario A needs to
    # observe <think> leakage first, then flip to `verify-ollama-tuned`
    # and confirm the filter strips it.
    # Deliberately LOW extra_body.options — pins num_ctx to 2048 and
    # num_predict to 16 so the v1.0-B canary probe reliably truncates
    # (2048 < 8192 threshold, forces NEEDS_TUNING + patch) and the
    # v1.0-C streaming probe reliably hits finish_reason=length with
    # tiny content (≈16 chars for the "Count from 1 to 30" prompt, well
    # below the 40-char threshold, forces NEEDS_TUNING + patch). The
    # original design relied on fresh-install Ollama defaults, but some
    # builds raise num_ctx default above 2048 and num_predict high
    # enough that the count prompt completes normally — declaring
    # pathological values explicitly makes the verify reproducible
    # across Ollama forks without weakening the narrow-experimental-
    # control property (bare and tuned still differ only in
    # declaration-field values).
    extra_body:
      options:
        num_ctx: 2048
        num_predict: 16
    capabilities:
      chat: true
      streaming: true
      tools: true

  - name: verify-ollama-tuned
    kind: openai_compat
    base_url: http://localhost:11434/v1
    model: qwen2.5-coder:7b
    paid: false
    timeout_s: 120
    # v1.0-A: filter chain turned on. Same shape as production
    # `ollama-qwen-coder-7b`.
    output_filters: [strip_thinking]
    # v1.0-B + v1.0-C: both Ollama knobs declared at the patch defaults
    # the doctor would emit. After applying these, doctor probes should
    # return OK instead of NEEDS_TUNING on scenarios B and C.
    extra_body:
      options:
        num_ctx: 32768
        num_predict: 4096
    capabilities:
      chat: true
      streaming: true
      tools: true

profiles:
  # ==========================================================================
  # v1.7-B: 用途別プロファイル 4 種
  #
  # すべてのプロファイルに `append_system_prompt` で「Claude 風応答」を
  # nudge しています。Claude Code を主用途とするユーザーが、Sonnet/Opus
  # と "意味合い" が乖離した応答に困らないようにするのが目的。
  #
  # 各プロファイルの fallback 順序:
  #   1. ローカル (free, 最速、プライバシー)
  #   2. 無料クラウド (NIM 40 req/min / OpenRouter free 〜200 req/day)
  #   3. 有料クラウド (ALLOW_PAID=true 時のみ、Claude / GPT)
  # ==========================================================================

  # --------------------------------------------------------------------------
  # multi — デフォルト。vision 対応 + general purpose、一番無難な chain。
  # --------------------------------------------------------------------------
  # 画像が来てもテキストだけでも動き、Sonnet vision 風の応答を目指す。
  # 一番判断に迷ったときの "これでいい" 選択。
  # local primary は Gemma 4 26B (note 記事の "日常・バランスの王者")。
  - name: multi
    append_system_prompt: |
      You are a precise, concise assistant matching Claude Sonnet's style.
      Describe images factually with no speculation beyond what is visible.
      Answer questions directly without preamble.
    providers:
      - ollama-gemma4-26b              # local vision-capable primary (note 推奨)
      - ollama-gemma4-31b              # local quality fallback (Dense)
      - ollama-qwen3-6-35b             # local: Qwen3.6 vision で fallback
      - openrouter-gemini-flash-free   # cloud free, vision, 1M ctx
      - openrouter-free                # cloud free chat fallback
      - anthropic-direct               # paid: Sonnet 4-6 with vision (★★★★★)

  # --------------------------------------------------------------------------
  # coding — Claude Code / agentic coding 用。Qwen3.6 / Qwen3-Coder 主軸。
  # --------------------------------------------------------------------------
  # Sonnet の tool-call 行動に最も近い Qwen3.6 35B-A3B を local primary に
  # 置き、Qwen3-Coder family を量サイズ別の fallback、cloud は NIM/OR の
  # qwen3-coder:free、最後に Sonnet または GLM-4.7 有料。
  - name: coding
    append_system_prompt: |
      Match Claude Sonnet's coding style: terse, structured, tools used precisely.
      Prefer code blocks over prose. Avoid filler explanations unless asked.
      When using tools, batch independent operations in parallel.
    providers:
      - ollama-qwen3-6-35b             # local primary (note "local champ")
      - ollama-qwen3-coder-30b         # local: agentic-coding 特化 fallback
      - ollama-qwen-coder-14b          # local quality fallback
      - ollama-qwen-coder-7b           # local fast fallback
      - openrouter-free                # cloud: qwen3-coder:free (262K ctx)
      - openrouter-gpt-oss-free        # cloud: vendor diversity (rate-limit 逃げ)
      - zai-coding-glm-4-7             # paid: GLM-4.7 (Sonnet 級、Z.AI Coding Plan)
      - anthropic-direct               # paid: Sonnet 4-6 (最終手段)

  # --------------------------------------------------------------------------
  # general — 雑用 / Q&A / 短い会話。Haiku 風のテンポを目指す。
  # --------------------------------------------------------------------------
  # 「応答が短くてサッと欲しい」用途。長い説明や深い推論は要らないとき。
  - name: general
    append_system_prompt: |
      Match Claude Haiku's style: concise, direct, no preamble.
      Aim for 1-3 sentence answers unless the question genuinely needs more.
    providers:
      - ollama-gemma4-e4b              # local primary (laptop/iGPU でも動く軽量)
      - ollama-gemma4-26b              # local quality fallback
      - openrouter-gemini-flash-free   # cloud free (1M ctx, 速い)
      - openrouter-gpt-oss-free        # cloud free fallback
      - zai-coding-glm-4-5-air         # paid: GLM-4.5-Air (Haiku 級)
      - anthropic-haiku-direct         # paid: Haiku 4-5 (Sonnet の 1/5 コスト)

  # --------------------------------------------------------------------------
  # reasoning — 難問 / 長文推論 / "thinking" モード相当。
  # --------------------------------------------------------------------------
  # 注: このプロファイルは「応答が冗長になる」のがデフォルトの挙動です。
  # Opus の thinking モードを意図したもので、サクッと答えが欲しいなら
  # `general` または `multi` を使ってください。
  #
  # local primary は Qwen3.6 35B (vision+thinking 対応)。GLM 系は Z.AI
  # cloud (zai-coding-glm-5-1) または HF-on-Ollama stanza を有効化して
  # 引き寄せ可能。
  - name: reasoning
    append_system_prompt: |
      Think carefully step by step. Show key reasoning steps but keep them
      compact. State the final conclusion explicitly at the end of your answer.
      Match Claude Opus's thinking-mode style.
    providers:
      - ollama-qwen3-6-35b             # local primary (thinking native)
      - ollama-qwen3-coder-30b         # local: coding+reasoning 兼用 fallback
      # ローカルで GLM-4.5-Air を使いたい場合は HF stanza を有効化:
      # - ollama-glm-4-5-air-hf
      - openrouter-free                # cloud free (Qwen3-Coder 480B reasoning)
      - openrouter-gpt-oss-free        # cloud free (gpt-oss reasoning)
      - zai-coding-glm-5-1             # paid: GLM-5.1 (Opus 級フラッグシップ)
      - anthropic-opus-direct          # paid: Opus 4-1 with thinking (★★★★★)

  # ==========================================================================
  # Legacy / backward-compat profiles
  # ==========================================================================

  # Generic chain — safe default for curl / OpenAI SDK / non-Claude-Code use.
  # v1.7-B 以降の推奨は `multi` (default_profile)。`default` を明示指定する
  # クライアントとの後方互換のため残置。
  - name: default
    providers:
      - ollama-qwen-coder-7b
      - openrouter-free
      - openrouter-gpt-oss-free
      - openrouter-claude

  # Tuned for `ANTHROPIC_BASE_URL=http://localhost:8088 claude`.
  # Claude Code declares all its tools (Bash/Glob/Read/Write/...) every turn,
  # so the router always engages the v0.3-D tool-downgrade path. That means
  # user-felt latency ≈ upstream total response time. Keep the first provider
  # fast and capable of tool-calling; put 14b second for retries when 7b
  # mis-selects a tool, then two free-tier OpenRouter models as cloud escape
  # hatches (rate-limit covered), and Claude as the paid last resort.
  - name: claude-code
    providers:
      - ollama-qwen-coder-7b
      - ollama-qwen-coder-14b
      - openrouter-free
      - openrouter-gpt-oss-free
      - openrouter-claude

  # Same shape as `claude-code` but swaps the paid last resort from
  # `openrouter-claude` (OpenAI-compat translation path) to `anthropic-direct`
  # (native `kind: anthropic`, v0.3.x-1+). Prefer this when your client reaches
  # CodeRouter via the Anthropic ingress (`ANTHROPIC_BASE_URL=...`) and you
  # want `cache_control` / `thinking` blocks to pass through untouched.
  # From `/v1/chat/completions` the v0.4-A reverse-translation path still
  # works for basic chat / tools / vision, but Anthropic-only features
  # (cache_control / thinking) require the Anthropic ingress.
  - name: claude-code-direct
    providers:
      - ollama-qwen-coder-7b
      - ollama-qwen-coder-14b
      - openrouter-free
      - openrouter-gpt-oss-free
      - anthropic-direct

  # Strictly no paid providers, even if ALLOW_PAID=true.
  - name: free-only
    providers:
      - ollama-qwen-coder-7b
      - ollama-qwen-coder-14b
      - openrouter-free
      - openrouter-gpt-oss-free

  # v0.5 real-machine verify — openai_compat-only chain. This profile exists so
  # `scripts/verify_v0_5.sh` can reliably fire the capability-degraded log for
  # all three gates (thinking / cache_control / reasoning) on a single provider
  # that is known to be non-capable for them. Using this profile with:
  #   - /v1/messages + `thinking` block  → reason: provider-does-not-support
  #   - /v1/messages + `cache_control`   → reason: translation-lossy
  #   - /v1/chat/completions             → reason: non-standard-field
  #                                        (gpt-oss emits a stray `reasoning` key)
  # Not intended for production use — ordinary `claude-code-direct` traffic
  # should keep anthropic-direct in the chain so thinking / cache_control are
  # preserved natively.
  - name: verify-gpt-oss
    providers:
      - openrouter-gpt-oss-free

  # v1.0 real-machine verify — Ollama-on-localhost chains. Two profiles, each
  # pointing at a single stanza from the `verify-ollama-*` provider pair
  # (below in `providers:`). `scripts/verify_v1_0.sh` fires three scenarios:
  #
  #   Scenario A (v1.0-A filter chain)   → `verify-v1-bare` + Claude Code-ish
  #                                        system prompt that encourages
  #                                        <think> blocks; then re-runs against
  #                                        `verify-v1-tuned` and asserts the
  #                                        `<think>` tags are gone from content
  #                                        and `output_filter_applied` log
  #                                        fires exactly once per request.
  #   Scenario B (v1.0-B num_ctx probe)  → `coderouter doctor --check-model
  #                                        verify-ollama-bare` → NEEDS_TUNING
  #                                        + `extra_body.options.num_ctx: 32768`
  #                                        patch. Then against
  #                                        `verify-ollama-tuned` → OK.
  #   Scenario C (v1.0-C streaming probe)→ same pair, asserts num_predict patch
  #                                        emits on bare, streaming probe OK
  #                                        on tuned.
  #
  # Not for production use — `verify-ollama-bare` is deliberately the worst-
  # case Ollama setup (defaults honored as-is, no filter) so that every v1.0
  # gate reliably trips. `verify-ollama-tuned` is the healthy counterpart,
  # used to prove the same probes flip to OK once the YAML patches are in.
  - name: verify-v1-bare
    providers:
      - verify-ollama-bare

  - name: verify-v1-tuned
    providers:
      - verify-ollama-tuned
