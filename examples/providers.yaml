# ============================================================
# CodeRouter providers.yaml — sample
#
# Default behavior:
#   - allow_paid: false  (paid providers are skipped unless ALLOW_PAID=true)
#   - default_profile: 'default'
#
# To use:
#   1. cp examples/providers.yaml ~/.coderouter/providers.yaml
#   2. Edit base_url / model to match your local stack
#   3. cp examples/.env.example .env  and fill in OPENROUTER_API_KEY if you want fallback
#   4. coderouter serve
#
# Profiles provided (see the `profiles:` section at the bottom):
#   - default             generic chain, 7b local → 2 free clouds → (paid if allowed)
#   - claude-code         tuned for Claude Code (see README "Use it with Claude Code")
#                         — 7b first for latency, 14b as quality fallback, 14b has
#                           timeout_s=300 because Claude Code sends 15-20K-token
#                           system prompts every turn that take ~100s to prefill.
#                           Then 2 free OpenRouter models (qwen3-coder / gpt-oss-120b,
#                           different vendors for rate-limit diversity) as cloud
#                           escape hatches, Claude as paid last resort.
#   - claude-code-direct  same as claude-code but the paid last resort is
#                         `anthropic-direct` (kind: anthropic) instead of
#                         `openrouter-claude` (kind: openai_compat). Use this when:
#                           (a) you want cache_control / thinking blocks to survive
#                               the hop (they're lost through openai_compat's
#                               OpenAI-shape round-trip), AND
#                           (b) your client reaches CodeRouter via the Anthropic
#                               ingress (`ANTHROPIC_BASE_URL=http://localhost:8088`).
#                         If (a) is needed but your client uses `/v1/chat/completions`,
#                         basic chat / tools / vision still work in v0.4-A (adapter
#                         internally reverse-translates ChatRequest→AnthropicRequest),
#                         but cache_control / thinking require the Anthropic ingress.
#   - coding              alias of default, kept for backward compat
#   - free-only           skips paid tier entirely
#
# Free-tier notes (2026-04):
#   OpenRouter free models are rate-limited to ~20 req/min and ~200 req/day
#   per model per account. Listing TWO free providers in each profile gives
#   you one escape hatch when one of them returns 429. Prefer picking from
#   DIFFERENT vendor families (e.g. qwen + openai/gpt-oss) since per-account
#   quotas can be shared across same-vendor SKUs.
#   Current roster verified against https://openrouter.ai/api/v1/models on
#   2026-04-20:
#     - qwen/qwen3-coder:free       (262K ctx, tools, agentic coding spec.) ✓
#     - openai/gpt-oss-120b:free    (131K ctx, tools, 117B MoE/5.1B active) ✓
#   deepseek/deepseek-r1:free was removed from the free roster at some point
#   in 2026 Q1 — don't re-introduce it without confirming it's back.
# ============================================================

allow_paid: false
default_profile: default

providers:
  # ------------------------------------------------------------
  # Tier 1: local (free, top priority)
  # ------------------------------------------------------------

  # llama.cpp --api-server — fastest if you have a GGUF loaded
  - name: local-llamacpp
    kind: openai_compat
    base_url: http://localhost:8080/v1
    model: qwen2.5-coder
    paid: false
    timeout_s: 60
    capabilities:
      chat: true
      streaming: true
      tools: false              # toggle true once your local model is reliable

  # Ollama — convenient for trying multiple models
  # Small & fast (1-2s/turn on M-series for non-Claude-Code traffic,
  # but tool selection is weak — not recommended as Claude Code's primary).
  - name: ollama-qwen-coder-1_5b
    kind: openai_compat
    base_url: http://localhost:11434/v1
    model: qwen2.5-coder:1.5b
    paid: false
    timeout_s: 60
    capabilities:
      chat: true
      streaming: true
      tools: false              # 1.5b is below the reliable tool-calling threshold

  # Balanced default for interactive coding. This is the sweet spot for
  # Claude Code: tool selection mostly works, prompt eval ~30s on M-series.
  - name: ollama-qwen-coder-7b
    kind: openai_compat
    base_url: http://localhost:11434/v1
    model: qwen2.5-coder:7b
    paid: false
    timeout_s: 120
    capabilities:
      chat: true
      streaming: true
      tools: true

  # Highest-quality local option. Timeout bumped to 300s because Claude Code's
  # system prompt (15-20K tokens) takes ~100s to prefill on 14b even on M3 Max.
  # Use as a quality fallback when 7b misfires, not as the primary — first-byte
  # latency is felt by the user.
  - name: ollama-qwen-coder-14b
    kind: openai_compat
    base_url: http://localhost:11434/v1
    model: qwen2.5-coder:14b
    paid: false
    timeout_s: 300
    capabilities:
      chat: true
      streaming: true
      tools: true

  # ------------------------------------------------------------
  # Tier 2: free cloud (escape hatch)
  #
  # OpenRouter free-tier rate limits (as of 2026-04):
  #   ~20 req/min, ~200 req/day per model, per account.
  # Listing multiple free providers lets the chain fall through when one
  # model hits the daily cap — keep both entries enabled if you use Claude
  # Code heavily.
  # ------------------------------------------------------------

  # Primary free choice. Qwen3-Coder 480B MoE (35B active) — optimized for
  # agentic coding with tool use, 262K context. Can emit tool calls inside
  # <tool_call>{...}</tool_call> text wrappers; v0.3-A tool-call repair
  # extracts the JSON body and lifts it back to a proper tool_use block.
  - name: openrouter-free
    kind: openai_compat
    base_url: https://openrouter.ai/api/v1
    model: qwen/qwen3-coder:free
    api_key_env: OPENROUTER_API_KEY
    paid: false                # OpenRouter free tier — no charge
    timeout_s: 60
    capabilities:
      chat: true
      streaming: true
      tools: true

  # Rate-limit escape hatch for when openrouter-free returns 429. Chosen for
  # vendor diversity (different account / quota pool from Qwen) so that a
  # Qwen-side 429 doesn't also hit this entry. gpt-oss-120b is OpenAI's
  # open-weight 117B MoE (5.1B active), 131K context, built for agentic /
  # production use with native tool calling.
  #
  # Note (2026-04): Previously this slot was `deepseek/deepseek-r1:free`, but
  # that SKU was removed from OpenRouter's free roster. gpt-oss replaces it.
  - name: openrouter-gpt-oss-free
    kind: openai_compat
    base_url: https://openrouter.ai/api/v1
    model: openai/gpt-oss-120b:free
    api_key_env: OPENROUTER_API_KEY
    paid: false
    timeout_s: 60
    capabilities:
      chat: true
      streaming: true
      tools: true

  # ------------------------------------------------------------
  # Tier 3: paid cloud (last resort, blocked unless ALLOW_PAID=true)
  # ------------------------------------------------------------

  # Claude via OpenRouter. OpenRouter typically maintains slug aliases that
  # point to the current-stable Anthropic model, so `claude-sonnet-4` will
  # often redirect to the latest minor version. Pin to a specific slug
  # (e.g. `anthropic/claude-sonnet-4.6`) if you want reproducibility.
  - name: openrouter-claude
    kind: openai_compat
    base_url: https://openrouter.ai/api/v1
    model: anthropic/claude-sonnet-4
    api_key_env: OPENROUTER_API_KEY
    paid: true
    timeout_s: 60
    capabilities:
      chat: true
      streaming: true
      tools: true

  # Claude direct via Anthropic's native Messages API (v0.3.x-1).
  # Unlike the OpenRouter entry above, this uses `kind: anthropic` — the
  # router passes the request body straight through `/v1/messages` to
  # api.anthropic.com with no OpenAI-shape translation in between when
  # reached via the Anthropic ingress. This preserves native features
  # (cache_control, thinking blocks, structured tool_use SSE events)
  # that would otherwise be lossy through the ChatRequest round-trip.
  #
  # v0.4-A update: this provider is ALSO reachable from the OpenAI-shape
  # ingress (`/v1/chat/completions`). AnthropicAdapter internally runs
  # ChatRequest → AnthropicRequest → native call → ChatResponse, and the
  # streaming path produces proper OpenAI-shape StreamChunks. Anthropic-
  # only features (cache_control / thinking) still require the
  # `/v1/messages` ingress, but basic chat / tools / vision work from
  # either side.
  # Model: `claude-sonnet-4-6` — chosen because Claude Code sends
  # adaptive-thinking requests (`thinking.type: enabled` with dynamic
  # budget) for some side calls (topic naming / auto-compact summaries).
  # Older models like `claude-sonnet-4-5-20250929` 400 those with
  # `"adaptive thinking is not supported on this model"`. Verified real-
  # machine on 2026-04-20 against live Claude Code traffic — see
  # CHANGELOG [v0.4-D] for the full diagnostic chain.
  - name: anthropic-direct
    kind: anthropic
    base_url: https://api.anthropic.com
    model: claude-sonnet-4-6
    api_key_env: ANTHROPIC_API_KEY
    paid: true
    timeout_s: 60
    capabilities:
      chat: true
      streaming: true
      tools: true
    # Optional: override the default anthropic-version header (2023-06-01)
    # extra_body:
    #   anthropic_version: "2023-06-01"

profiles:
  # Generic chain — safe default for curl / OpenAI SDK / non-Claude-Code use.
  - name: default
    providers:
      - ollama-qwen-coder-7b
      - openrouter-free
      - openrouter-gpt-oss-free
      - openrouter-claude

  # Tuned for `ANTHROPIC_BASE_URL=http://localhost:8088 claude`.
  # Claude Code declares all its tools (Bash/Glob/Read/Write/...) every turn,
  # so the router always engages the v0.3-D tool-downgrade path. That means
  # user-felt latency ≈ upstream total response time. Keep the first provider
  # fast and capable of tool-calling; put 14b second for retries when 7b
  # mis-selects a tool, then two free-tier OpenRouter models as cloud escape
  # hatches (rate-limit covered), and Claude as the paid last resort.
  - name: claude-code
    providers:
      - ollama-qwen-coder-7b
      - ollama-qwen-coder-14b
      - openrouter-free
      - openrouter-gpt-oss-free
      - openrouter-claude

  # Same shape as `claude-code` but swaps the paid last resort from
  # `openrouter-claude` (OpenAI-compat translation path) to `anthropic-direct`
  # (native `kind: anthropic`, v0.3.x-1+). Prefer this when your client reaches
  # CodeRouter via the Anthropic ingress (`ANTHROPIC_BASE_URL=...`) and you
  # want `cache_control` / `thinking` blocks to pass through untouched.
  # From `/v1/chat/completions` the v0.4-A reverse-translation path still
  # works for basic chat / tools / vision, but Anthropic-only features
  # (cache_control / thinking) require the Anthropic ingress.
  - name: claude-code-direct
    providers:
      - ollama-qwen-coder-7b
      - ollama-qwen-coder-14b
      - openrouter-free
      - openrouter-gpt-oss-free
      - anthropic-direct

  # Alias — historically used for code-heavy tasks. Kept for backward compat.
  - name: coding
    providers:
      - ollama-qwen-coder-7b
      - openrouter-free
      - openrouter-gpt-oss-free
      - openrouter-claude

  # Strictly no paid providers, even if ALLOW_PAID=true.
  - name: free-only
    providers:
      - ollama-qwen-coder-7b
      - ollama-qwen-coder-14b
      - openrouter-free
      - openrouter-gpt-oss-free
