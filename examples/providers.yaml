# ============================================================
# CodeRouter providers.yaml — sample
#
# Default behavior:
#   - allow_paid: false  (paid providers are skipped unless ALLOW_PAID=true)
#   - default_profile: 'default'
#
# To use:
#   1. cp examples/providers.yaml ~/.coderouter/providers.yaml
#   2. Edit base_url / model to match your local stack
#   3. cp examples/.env.example .env  and fill in OPENROUTER_API_KEY if you want fallback
#   4. coderouter serve
#
# Profiles provided (see the `profiles:` section at the bottom):
#   - default             generic chain, 7b local → 2 free clouds → (paid if allowed)
#   - claude-code         tuned for Claude Code (see README "Use it with Claude Code")
#                         — 7b first for latency, 14b as quality fallback, 14b has
#                           timeout_s=300 because Claude Code sends 15-20K-token
#                           system prompts every turn that take ~100s to prefill.
#                           Then 2 free OpenRouter models (qwen3-coder / gpt-oss-120b,
#                           different vendors for rate-limit diversity) as cloud
#                           escape hatches, Claude as paid last resort.
#   - claude-code-direct  same as claude-code but the paid last resort is
#                         `anthropic-direct` (kind: anthropic) instead of
#                         `openrouter-claude` (kind: openai_compat). Use this when:
#                           (a) you want cache_control / thinking blocks to survive
#                               the hop (they're lost through openai_compat's
#                               OpenAI-shape round-trip), AND
#                           (b) your client reaches CodeRouter via the Anthropic
#                               ingress (`ANTHROPIC_BASE_URL=http://localhost:8088`).
#                         If (a) is needed but your client uses `/v1/chat/completions`,
#                         basic chat / tools / vision still work in v0.4-A (adapter
#                         internally reverse-translates ChatRequest→AnthropicRequest),
#                         but cache_control / thinking require the Anthropic ingress.
#   - coding              alias of default, kept for backward compat
#   - free-only           skips paid tier entirely
#
# Free-tier notes (2026-04):
#   OpenRouter free models are rate-limited to ~20 req/min and ~200 req/day
#   per model per account. Listing TWO free providers in each profile gives
#   you one escape hatch when one of them returns 429. Prefer picking from
#   DIFFERENT vendor families (e.g. qwen + openai/gpt-oss) since per-account
#   quotas can be shared across same-vendor SKUs.
#   Current roster verified against https://openrouter.ai/api/v1/models on
#   2026-04-20:
#     - qwen/qwen3-coder:free       (262K ctx, tools, agentic coding spec.) ✓
#     - openai/gpt-oss-120b:free    (131K ctx, tools, 117B MoE/5.1B active) ✓
#   deepseek/deepseek-r1:free was removed from the free roster at some point
#   in 2026 Q1 — don't re-introduce it without confirming it's back.
# ============================================================

allow_paid: false
default_profile: default

providers:
  # ------------------------------------------------------------
  # Tier 1: local (free, top priority)
  # ------------------------------------------------------------

  # llama.cpp --api-server — fastest if you have a GGUF loaded
  - name: local-llamacpp
    kind: openai_compat
    base_url: http://localhost:8080/v1
    model: qwen2.5-coder
    paid: false
    timeout_s: 60
    capabilities:
      chat: true
      streaming: true
      tools: false              # toggle true once your local model is reliable

  # Ollama — convenient for trying multiple models
  # Small & fast (1-2s/turn on M-series for non-Claude-Code traffic,
  # but tool selection is weak — not recommended as Claude Code's primary).
  - name: ollama-qwen-coder-1_5b
    kind: openai_compat
    base_url: http://localhost:11434/v1
    model: qwen2.5-coder:1.5b
    paid: false
    timeout_s: 60
    capabilities:
      chat: true
      streaming: true
      tools: false              # 1.5b is below the reliable tool-calling threshold

  # Balanced default for interactive coding. This is the sweet spot for
  # Claude Code: tool selection mostly works, prompt eval ~30s on M-series.
  - name: ollama-qwen-coder-7b
    kind: openai_compat
    base_url: http://localhost:11434/v1
    model: qwen2.5-coder:7b
    paid: false
    timeout_s: 120
    # v1.0-A: Qwen2.5-Coder intermittently emits <think>...</think> in the
    # content channel under Claude Code's tool-heavy prompting. Strip at the
    # adapter boundary so the UI never renders it. `strip_stop_markers` is
    # not needed here (Qwen2.5 uses <|im_end|> but Ollama's chat template
    # terminates cleanly on it). Run `coderouter doctor --check-model
    # ollama-qwen-coder-7b` to verify the probe agrees.
    output_filters: [strip_thinking]
    capabilities:
      chat: true
      streaming: true
      tools: true

  # Highest-quality local option. Timeout bumped to 300s because Claude Code's
  # system prompt (15-20K tokens) takes ~100s to prefill on 14b even on M3 Max.
  # Use as a quality fallback when 7b misfires, not as the primary — first-byte
  # latency is felt by the user.
  - name: ollama-qwen-coder-14b
    kind: openai_compat
    base_url: http://localhost:11434/v1
    model: qwen2.5-coder:14b
    paid: false
    timeout_s: 300
    # v1.0-A: same reasoning as the 7b entry — Qwen2.5-Coder family leaks
    # <think> blocks occasionally. Scrubbing is cheap (single regex-free pass
    # over the stream) so enable it unconditionally on this SKU.
    output_filters: [strip_thinking]
    capabilities:
      chat: true
      streaming: true
      tools: true

  # ------------------------------------------------------------
  # HF-on-Ollama reference stanza (v0.7-C)
  #
  # Ollama 0.3.13+ can run any HF-hosted GGUF directly via
  # `ollama run hf.co/<user>/<repo>:<quant>`. This block is a template
  # with the 5 knobs that matter most when using HF distilled / fine-tuned
  # variants through CodeRouter. Each is mapped to the corresponding Ollama
  # beginner silent-fail symptom in the README Troubleshooting section; run
  # `coderouter doctor --check-model ollama-hf-example` after editing to
  # verify declarations match observed behavior.
  #
  # The block is commented out by default — uncomment and adjust when you
  # actually pull an HF GGUF. Typical candidates:
  #   hf.co/unsloth/Qwen2.5-Coder-7B-Instruct-GGUF:Q4_K_M   (coding, tools-capable)
  #   hf.co/bartowski/Qwen3-8B-GGUF:Q5_K_M                  (Qwen3 distill, <think>-leaky)
  #   hf.co/unsloth/DeepSeek-R1-Distill-Qwen-7B-GGUF:Q4_K_M (reasoning distill, tools-weak)
  #
  # Reminder: the HF `:<quant>` suffix is REQUIRED. Omitting it yields
  # `404 model not found` from Ollama (v0.7-B doctor's auth+basic-chat probe
  # surfaces this as UNSUPPORTED with an `ollama pull` hint).
  # ------------------------------------------------------------

  # - name: ollama-hf-example
  #   kind: openai_compat
  #   base_url: http://localhost:11434/v1
  #   # Replace with the `ollama list` entry verbatim, `:<quant>` suffix included.
  #   model: hf.co/unsloth/Qwen2.5-Coder-7B-Instruct-GGUF:Q4_K_M
  #   paid: false
  #   # Prefill of Claude Code's 15-20K-token system prompt dominates latency on
  #   # any 7B+ model; budget generously. Symptom 1 is not a timeout failure
  #   # per se — it's Ollama silently truncating the prompt to num_ctx below.
  #   timeout_s: 300
  #   extra_body:
  #     options:
  #       # Symptom 1: Ollama default `num_ctx` is 2048. Claude Code's system
  #       # prompt alone is 15-20K tokens, so prompts get truncated from the
  #       # FRONT (where the tool definitions live) and the model silently
  #       # forgets it has tools. Bump to 32K for Claude Code workloads;
  #       # lower (8K) is fine for plain chat traffic.
  #       num_ctx: 32768
  #   # Symptom 3 (primary): Qwen3 distills (and some R1 distills) inline
  #   # <think>...</think> in the content channel instead of using a thinking
  #   # block. Two independent remediations, pick either (or both):
  #   #
  #   #   (a) Source-side opt-out — append Qwen3's native `/no_think` directive
  #   #       to the system prompt. Cheapest when it works, but some distills
  #   #       ignore the directive.
  #   # append_system_prompt: "/no_think"
  #   #
  #   #   (b) Output-side scrub (v1.0-A) — strip at the adapter boundary
  #   #       regardless of what the model emits. Works on every model, at the
  #   #       cost of a single pass over the stream. Prefer this if you also
  #   #       see <|turn|> / <|end|> leakage — add `strip_stop_markers` too.
  #   output_filters: [strip_thinking]
  #   capabilities:
  #     chat: true
  #     streaming: true
  #     # Symptom 2: small quantized distills often ignore the `tools` parameter
  #     # or emit malformed JSON. Start with `false` (CodeRouter falls back to
  #     # plain chat completions), then flip to `true` if `coderouter doctor`
  #     # reports the tool_calls probe as OK. Setting `true` when the model
  #     # can't actually call tools causes Claude Code to hang waiting for a
  #     # tool_use block that never arrives.
  #     tools: false

  # ------------------------------------------------------------
  # Tier 2: free cloud (escape hatch)
  #
  # OpenRouter free-tier rate limits (as of 2026-04):
  #   ~20 req/min, ~200 req/day per model, per account.
  # Listing multiple free providers lets the chain fall through when one
  # model hits the daily cap — keep both entries enabled if you use Claude
  # Code heavily.
  # ------------------------------------------------------------

  # Primary free choice. Qwen3-Coder 480B MoE (35B active) — optimized for
  # agentic coding with tool use, 262K context. Can emit tool calls inside
  # <tool_call>{...}</tool_call> text wrappers; v0.3-A tool-call repair
  # extracts the JSON body and lifts it back to a proper tool_use block.
  - name: openrouter-free
    kind: openai_compat
    base_url: https://openrouter.ai/api/v1
    model: qwen/qwen3-coder:free
    api_key_env: OPENROUTER_API_KEY
    paid: false                # OpenRouter free tier — no charge
    timeout_s: 60
    capabilities:
      chat: true
      streaming: true
      tools: true

  # Rate-limit escape hatch for when openrouter-free returns 429. Chosen for
  # vendor diversity (different account / quota pool from Qwen) so that a
  # Qwen-side 429 doesn't also hit this entry. gpt-oss-120b is OpenAI's
  # open-weight 117B MoE (5.1B active), 131K context, built for agentic /
  # production use with native tool calling.
  #
  # Note (2026-04): Previously this slot was `deepseek/deepseek-r1:free`, but
  # that SKU was removed from OpenRouter's free roster. gpt-oss replaces it.
  - name: openrouter-gpt-oss-free
    kind: openai_compat
    base_url: https://openrouter.ai/api/v1
    model: openai/gpt-oss-120b:free
    api_key_env: OPENROUTER_API_KEY
    paid: false
    timeout_s: 60
    capabilities:
      chat: true
      streaming: true
      tools: true

  # ------------------------------------------------------------
  # Tier 3: paid cloud (last resort, blocked unless ALLOW_PAID=true)
  # ------------------------------------------------------------

  # Claude via OpenRouter. OpenRouter typically maintains slug aliases that
  # point to the current-stable Anthropic model, so `claude-sonnet-4` will
  # often redirect to the latest minor version. Pin to a specific slug
  # (e.g. `anthropic/claude-sonnet-4.6`) if you want reproducibility.
  - name: openrouter-claude
    kind: openai_compat
    base_url: https://openrouter.ai/api/v1
    model: anthropic/claude-sonnet-4
    api_key_env: OPENROUTER_API_KEY
    paid: true
    timeout_s: 60
    capabilities:
      chat: true
      streaming: true
      tools: true

  # Claude direct via Anthropic's native Messages API (v0.3.x-1).
  # Unlike the OpenRouter entry above, this uses `kind: anthropic` — the
  # router passes the request body straight through `/v1/messages` to
  # api.anthropic.com with no OpenAI-shape translation in between when
  # reached via the Anthropic ingress. This preserves native features
  # (cache_control, thinking blocks, structured tool_use SSE events)
  # that would otherwise be lossy through the ChatRequest round-trip.
  #
  # v0.4-A update: this provider is ALSO reachable from the OpenAI-shape
  # ingress (`/v1/chat/completions`). AnthropicAdapter internally runs
  # ChatRequest → AnthropicRequest → native call → ChatResponse, and the
  # streaming path produces proper OpenAI-shape StreamChunks. Anthropic-
  # only features (cache_control / thinking) still require the
  # `/v1/messages` ingress, but basic chat / tools / vision work from
  # either side.
  # Model: `claude-sonnet-4-6` — chosen because Claude Code sends
  # adaptive-thinking requests (`thinking.type: enabled` with dynamic
  # budget) for some side calls (topic naming / auto-compact summaries).
  # Older models like `claude-sonnet-4-5-20250929` 400 those with
  # `"adaptive thinking is not supported on this model"`. Verified real-
  # machine on 2026-04-20 against live Claude Code traffic — see
  # CHANGELOG [v0.4-D] for the full diagnostic chain.
  - name: anthropic-direct
    kind: anthropic
    base_url: https://api.anthropic.com
    model: claude-sonnet-4-6
    api_key_env: ANTHROPIC_API_KEY
    paid: true
    timeout_s: 60
    capabilities:
      chat: true
      streaming: true
      tools: true
      # v0.5-A capability gate. Setting `thinking: true` explicitly tells
      # the router this provider accepts Anthropic's `thinking: {type:
      # enabled, ...}` body field. When unset (like here), the router
      # falls back to a model-name heuristic — claude-sonnet-4-6 /
      # claude-opus-4-* / claude-haiku-4-* are auto-detected as capable.
      # Declaring it explicitly is only needed for forward-compat with
      # new Claude families before the heuristic table is updated, e.g.:
      #   thinking: true
    # Optional: override the default anthropic-version header (2023-06-01)
    # extra_body:
    #   anthropic_version: "2023-06-01"

  # ------------------------------------------------------------
  # v1.0 real-machine verify providers (v1.0-verify)
  #
  # Paired Ollama stanzas used by `scripts/verify_v1_0.sh` to prove the
  # three v1.0 sub-release gates (A output_filters / B num_ctx probe /
  # C streaming probe) all behave end-to-end against a live local Ollama.
  #
  # `verify-ollama-bare`: worst-case setup — no output_filters, and
  #   extra_body.options declared at deliberately pathological values
  #   (num_ctx = 2048, num_predict = 16). Forces <think> leakage through
  #   and guarantees the num_ctx / streaming probes both trip
  #   NEEDS_TUNING regardless of what the local Ollama build's actual
  #   defaults happen to be (some forks and newer builds raise num_ctx
  #   well above 2048 and num_predict high enough that a "count to 30"
  #   prompt finishes normally). num_predict = 16 is low enough that the
  #   streaming probe's "Count from 1 to 30" prompt is cut off after
  #   ~8 numbers (≈16 chars, well below the 40-char threshold for
  #   NEEDS_TUNING) — and also low enough that the num_ctx probe's
  #   canary-echo response cannot accidentally contain the canary token.
  #   Used as the "symptom-present" side of the verify.
  #
  # `verify-ollama-tuned`: healthy counterpart — output_filters enabled,
  #   both num_ctx and num_predict declared. Used as the "symptom-absent"
  #   side; the doctor probes should flip to OK here.
  #
  # Prerequisite: `ollama pull qwen2.5-coder:7b` on localhost, Ollama
  # service running on :11434. The verify script fails fast if either
  # is missing.
  # ------------------------------------------------------------

  - name: verify-ollama-bare
    kind: openai_compat
    base_url: http://localhost:11434/v1
    model: qwen2.5-coder:7b
    paid: false
    timeout_s: 120
    # Deliberately NO output_filters here — v1.0-A scenario A needs to
    # observe <think> leakage first, then flip to `verify-ollama-tuned`
    # and confirm the filter strips it.
    # Deliberately LOW extra_body.options — pins num_ctx to 2048 and
    # num_predict to 16 so the v1.0-B canary probe reliably truncates
    # (2048 < 8192 threshold, forces NEEDS_TUNING + patch) and the
    # v1.0-C streaming probe reliably hits finish_reason=length with
    # tiny content (≈16 chars for the "Count from 1 to 30" prompt, well
    # below the 40-char threshold, forces NEEDS_TUNING + patch). The
    # original design relied on fresh-install Ollama defaults, but some
    # builds raise num_ctx default above 2048 and num_predict high
    # enough that the count prompt completes normally — declaring
    # pathological values explicitly makes the verify reproducible
    # across Ollama forks without weakening the narrow-experimental-
    # control property (bare and tuned still differ only in
    # declaration-field values).
    extra_body:
      options:
        num_ctx: 2048
        num_predict: 16
    capabilities:
      chat: true
      streaming: true
      tools: true

  - name: verify-ollama-tuned
    kind: openai_compat
    base_url: http://localhost:11434/v1
    model: qwen2.5-coder:7b
    paid: false
    timeout_s: 120
    # v1.0-A: filter chain turned on. Same shape as production
    # `ollama-qwen-coder-7b`.
    output_filters: [strip_thinking]
    # v1.0-B + v1.0-C: both Ollama knobs declared at the patch defaults
    # the doctor would emit. After applying these, doctor probes should
    # return OK instead of NEEDS_TUNING on scenarios B and C.
    extra_body:
      options:
        num_ctx: 32768
        num_predict: 4096
    capabilities:
      chat: true
      streaming: true
      tools: true

profiles:
  # Generic chain — safe default for curl / OpenAI SDK / non-Claude-Code use.
  - name: default
    providers:
      - ollama-qwen-coder-7b
      - openrouter-free
      - openrouter-gpt-oss-free
      - openrouter-claude

  # Tuned for `ANTHROPIC_BASE_URL=http://localhost:8088 claude`.
  # Claude Code declares all its tools (Bash/Glob/Read/Write/...) every turn,
  # so the router always engages the v0.3-D tool-downgrade path. That means
  # user-felt latency ≈ upstream total response time. Keep the first provider
  # fast and capable of tool-calling; put 14b second for retries when 7b
  # mis-selects a tool, then two free-tier OpenRouter models as cloud escape
  # hatches (rate-limit covered), and Claude as the paid last resort.
  - name: claude-code
    providers:
      - ollama-qwen-coder-7b
      - ollama-qwen-coder-14b
      - openrouter-free
      - openrouter-gpt-oss-free
      - openrouter-claude

  # Same shape as `claude-code` but swaps the paid last resort from
  # `openrouter-claude` (OpenAI-compat translation path) to `anthropic-direct`
  # (native `kind: anthropic`, v0.3.x-1+). Prefer this when your client reaches
  # CodeRouter via the Anthropic ingress (`ANTHROPIC_BASE_URL=...`) and you
  # want `cache_control` / `thinking` blocks to pass through untouched.
  # From `/v1/chat/completions` the v0.4-A reverse-translation path still
  # works for basic chat / tools / vision, but Anthropic-only features
  # (cache_control / thinking) require the Anthropic ingress.
  - name: claude-code-direct
    providers:
      - ollama-qwen-coder-7b
      - ollama-qwen-coder-14b
      - openrouter-free
      - openrouter-gpt-oss-free
      - anthropic-direct

  # Alias — historically used for code-heavy tasks. Kept for backward compat.
  - name: coding
    providers:
      - ollama-qwen-coder-7b
      - openrouter-free
      - openrouter-gpt-oss-free
      - openrouter-claude

  # Strictly no paid providers, even if ALLOW_PAID=true.
  - name: free-only
    providers:
      - ollama-qwen-coder-7b
      - ollama-qwen-coder-14b
      - openrouter-free
      - openrouter-gpt-oss-free

  # v0.5 real-machine verify — openai_compat-only chain. This profile exists so
  # `scripts/verify_v0_5.sh` can reliably fire the capability-degraded log for
  # all three gates (thinking / cache_control / reasoning) on a single provider
  # that is known to be non-capable for them. Using this profile with:
  #   - /v1/messages + `thinking` block  → reason: provider-does-not-support
  #   - /v1/messages + `cache_control`   → reason: translation-lossy
  #   - /v1/chat/completions             → reason: non-standard-field
  #                                        (gpt-oss emits a stray `reasoning` key)
  # Not intended for production use — ordinary `claude-code-direct` traffic
  # should keep anthropic-direct in the chain so thinking / cache_control are
  # preserved natively.
  - name: verify-gpt-oss
    providers:
      - openrouter-gpt-oss-free

  # v1.0 real-machine verify — Ollama-on-localhost chains. Two profiles, each
  # pointing at a single stanza from the `verify-ollama-*` provider pair
  # (below in `providers:`). `scripts/verify_v1_0.sh` fires three scenarios:
  #
  #   Scenario A (v1.0-A filter chain)   → `verify-v1-bare` + Claude Code-ish
  #                                        system prompt that encourages
  #                                        <think> blocks; then re-runs against
  #                                        `verify-v1-tuned` and asserts the
  #                                        `<think>` tags are gone from content
  #                                        and `output_filter_applied` log
  #                                        fires exactly once per request.
  #   Scenario B (v1.0-B num_ctx probe)  → `coderouter doctor --check-model
  #                                        verify-ollama-bare` → NEEDS_TUNING
  #                                        + `extra_body.options.num_ctx: 32768`
  #                                        patch. Then against
  #                                        `verify-ollama-tuned` → OK.
  #   Scenario C (v1.0-C streaming probe)→ same pair, asserts num_predict patch
  #                                        emits on bare, streaming probe OK
  #                                        on tuned.
  #
  # Not for production use — `verify-ollama-bare` is deliberately the worst-
  # case Ollama setup (defaults honored as-is, no filter) so that every v1.0
  # gate reliably trips. `verify-ollama-tuned` is the healthy counterpart,
  # used to prove the same probes flip to OK once the YAML patches are in.
  - name: verify-v1-bare
    providers:
      - verify-ollama-bare

  - name: verify-v1-tuned
    providers:
      - verify-ollama-tuned
