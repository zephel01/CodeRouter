name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy coderouter

      - name: Tests
        run: uv run pytest -v

      - name: Forbidden import check (no anthropic / openai / litellm SDKs)
        run: |
          # plan.md §5.4 — the router itself must not depend on heavy SDKs
          if grep -RnE "^\s*(import|from)\s+(anthropic|openai|litellm|langchain)" coderouter/; then
            echo "Forbidden SDK import detected — see plan.md §5.4 (dependency minimalism)."
            exit 1
          fi
